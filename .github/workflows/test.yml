name: Test

on:
  pull_request:
    types:
      - "opened"
      - "synchronize"
  push:
    branches:
      - "main"

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: "py${{ matrix.python-version }}; pydantic-${{ matrix.pydantic_v2 == 'true' && 'v2' || 'v1' }}; fastapi-${{ matrix.fastapi_version }}${{ matrix.run_typing == 'true' && '; typing' || '' }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.10", pydantic_v2: "true", fastapi_version: "current" }
          - { python-version: "3.11", pydantic_v2: "true", fastapi_version: "current" }
          - { python-version: "3.12", pydantic_v2: "true", fastapi_version: "current" }
          - { python-version: "3.13", pydantic_v2: "true", fastapi_version: "current" }
          - { python-version: "3.14", pydantic_v2: "true", fastapi_version: "current" }

          - { python-version: "3.8",  pydantic_v2: "false", fastapi_version: "0.115.0" }
          - { python-version: "3.9",  pydantic_v2: "false", fastapi_version: "0.115.0" }
          - { python-version: "3.10", pydantic_v2: "false", fastapi_version: "0.115.0" }
          - { python-version: "3.8",  pydantic_v2: "true",  fastapi_version: "0.115.0" }
          - { python-version: "3.9",  pydantic_v2: "true",  fastapi_version: "0.115.0" }
          - { python-version: "3.10", pydantic_v2: "true",  fastapi_version: "0.115.0" }
          - { python-version: "3.12", pydantic_v2: "true",  fastapi_version: "0.115.0" }
          - { python-version: "3.12", pydantic_v2: "true",  fastapi_version: "0.128.2" }
          - { python-version: "3.12", pydantic_v2: "true",  fastapi_version: "0.128.3" }
          - { python-version: "3.12", pydantic_v2: "true",  fastapi_version: "0.136.3" }

          - { python-version: "3.10", pydantic_v2: "true", fastapi_version: "0.136.3", run_typing: "true" }

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run tests
        shell: bash
        env:
          PY_VERSION: ${{ matrix.python-version }}
          PYDANTIC_V2: ${{ matrix.pydantic_v2 }}
          FASTAPI_VERSION: ${{ matrix.fastapi_version }}
          RUN_MODULE_TYPING: ${{ matrix.run_typing || 'false' }}
        run: |
          bash ./scripts/test.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          use_oidc: true
          files: ./coverage.xml
